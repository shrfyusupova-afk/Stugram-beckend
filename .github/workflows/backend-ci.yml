name: Backend CI

on:
  push:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check production scripts parse
        run: |
          node --check server.js
          node --check src/scripts/smokeProduction.js
          node --check src/workers/runRecommendationRefreshWorker.js

      - name: Run integration tests
        env:
          MONGODB_URI: mongodb://localhost:27017/test
          JWT_ACCESS_SECRET: test_access_secret_123456
          JWT_REFRESH_SECRET: test_refresh_secret_123456
          OTP_SECRET: test_otp_secret_123456
          REDIS_URL: redis://127.0.0.1:6379
          CLOUDINARY_CLOUD_NAME: test-cloud
          CLOUDINARY_API_KEY: test-key
          CLOUDINARY_API_SECRET: test-secret
        run: npm test
